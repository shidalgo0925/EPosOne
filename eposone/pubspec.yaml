name: eposone
description: ePosOne - POS Android Flutter offline-first para pequeños negocios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.0.0

  # Estado
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Base de datos local
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Generación PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Utilidades
  path_provider: ^2.1.0
  image_picker: ^1.1.2
  share_plus: ^9.0.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  uuid: ^4.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # UI
  flutter_slidable: ^3.1.0
  dropdown_search: ^5.0.0
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.5.5
  print_bluetooth_thermal: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/catalog/istmo/