name: eposone
description: ePosOne - POS Android Flutter offline-first para pequeños negocios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.0.0

  # Estado
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Base de datos local
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Generación PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Utilidades
  path_provider: ^2.1.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  uuid: ^4.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # UI
  flutter_slidable: ^3.1.0
  dropdown_search: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  freezed: ^2.5.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true